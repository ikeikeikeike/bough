name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Tags can race when batched; one release run at a time is plenty.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to publish a GitHub Release
      id-token: write   # required for keyless cosign signing via GitHub Actions OIDC
    steps:
      - uses: actions/checkout@v6
        with:
          # GoReleaser's changelog needs the full history to diff back
          # to the previous tag.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Cosign on PATH so the .goreleaser.yaml `signs` block can run
      # `cosign sign-blob` over each archive. Sigstore's keyless flow
      # picks up the OIDC token from `id-token: write` above.
      - uses: sigstore/cosign-installer@v3

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
