name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Go test + lint + nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          diagnostic-endpoint: ''
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: nix flake check
        run: nix flake check --no-build --show-trace

      # --no-build above means the flake check only EVALUATES packages.default,
      # so a vendorHash that no longer matches go.mod evaluates clean and fails
      # only for whoever runs `nix profile install github:threecorp/bough`.
      # That is exactly how v0.10.0 shipped a broken flake install and stayed
      # green until v0.18. The `build smoke` step below does not cover it
      # either — it builds inside the dev shell with go, never through nix's
      # vendored deps. This is the only step that exercises the install path
      # the README documents.
      - name: nix build (guards vendorHash against go.mod)
        run: nix build .#default --no-link --show-trace

      - name: go vet + test
        run: nix develop .#ci -c go test ./... -race

      - name: golangci-lint
        run: nix develop .#ci -c golangci-lint run ./...

      - name: build smoke
        run: nix develop .#ci -c make build

      - name: actionlint
        run: nix develop .#ci -c actionlint

  conformance:
    name: Plugin conformance (real Docker)
    needs: test
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm]
        plugin: [mysql, postgres, redis, elasticsearch, compose]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          diagnostic-endpoint: ''
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Raise vm.max_map_count (elasticsearch only)
        if: ${{ matrix.plugin == 'elasticsearch' }}
        # Elasticsearch refuses to leave the bootstrap-check phase
        # when vm.max_map_count < 262144, which is the GHA runner
        # default of 65530. Without this nudge the container starts,
        # logs `max virtual memory areas vm.max_map_count [65530] is
        # too low`, and never accepts TCP — ReadyCheck then burns the
        # entire ReadyTimeout window. Docker Desktop on macOS hides
        # this because the daemon VM already sets a higher value.
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Pre-pull container images
        run: |
          # alpine is the chown helper image the conformance suite spins
          # up to recover from container-uid-owned datadir files (see
          # conformance/datadir.go); pull it alongside the engine image
          # so the test's cleanup path is not what stalls the runner.
          docker pull alpine:3.20
          case "${{ matrix.plugin }}" in
            mysql)         docker pull mysql:8.4 ;;
            postgres)      docker pull postgres:17 ;;
            redis)         docker pull redis:7 ;;
            elasticsearch) docker pull docker.elastic.co/elasticsearch/elasticsearch:7.17.29 ;;
            # compose wraps whatever image its own testdata/compose.yml
            # declares (redis:7-alpine) rather than extras["docker.image"].
            compose)       docker pull redis:7-alpine ;;
          esac

      - name: Build plugin binary
        run: |
          mkdir -p bin
          nix develop .#ci -c go build \
            -o bin/bough-plugin-${{ matrix.plugin }} \
            ./cmd/bough-plugin-${{ matrix.plugin }}

      - name: Run conformance suite
        env:
          BOUGH_CONFORMANCE_PLUGIN_BIN: ${{ github.workspace }}/bin/bough-plugin-${{ matrix.plugin }}
        run: |
          nix develop .#ci -c go test -tags=conformance -race -timeout=15m -v \
            ./plugins/engine/${{ matrix.plugin }}/...

      - name: Diagnostic — dump bough container logs (on failure)
        if: failure()
        run: |
          echo "=== docker ps -a ==="
          docker ps -a
          echo ""
          for c in $(docker ps -aq --filter name=bough-); do
            echo "=== inspect $c ==="
            docker inspect "$c" --format '{{.Name}} {{.State.Status}} ExitCode={{.State.ExitCode}} Error={{.State.Error}} OOMKilled={{.State.OOMKilled}}'
            echo "=== logs --tail 200 $c ==="
            docker logs --tail 200 "$c" 2>&1 || true
          done

  # v0.9 reset deleted the memory + MCP plugin tree. Memory plugin
  # conformance / macOS smoke jobs are removed alongside. Operators
  # who need the SQLite reference-fallback or mem0 adapter stay on
  # v0.8.1.
