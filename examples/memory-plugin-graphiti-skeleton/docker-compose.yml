# Graphiti + Neo4j sidecar for local bough mem0 / Graphiti development.
#
# Round 4 AI #2: Graphiti needs a graph DB + service process + LLM
# extraction, which is too heavy to bundle into bough core. We ship
# this docker-compose snippet so developers can stand up a local
# Graphiti stack quickly, and v0.6.x will publish a separate
# `bough-plugin-memory-graphiti` binary that talks to whatever
# Graphiti URL the operator points at.
#
# Required environment variable (= the LLM Graphiti uses for entity /
# relation extraction):
#
#   OPENAI_API_KEY=sk-...
#
# Bring up:    docker compose up -d
# Bring down:  docker compose down
# Tail logs:   docker compose logs -f graphiti

version: "3.8"

services:
  neo4j:
    image: neo4j:5.13
    container_name: bough-graphiti-neo4j
    environment:
      NEO4J_AUTH: neo4j/bough-dev-password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  graphiti:
    image: getzep/graphiti:latest
    container_name: bough-graphiti
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: bough-dev-password
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY must be set for Graphiti's LLM extraction}
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data: {}
